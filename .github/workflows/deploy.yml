name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  # Triggered by Supabase when content changes (see supabase/functions/trigger-rebuild)
  repository_dispatch:
    types: [supabase-content-update]
  # Manual "Run workflow" button in the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Collapse rapid content edits into a single build
concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run build
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build

    permissions:
      pages: write
      id-token: write

    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4