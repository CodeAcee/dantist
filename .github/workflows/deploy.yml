name: Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm ci

      # ── Build for Hostiq (base "/") ──────────────────────────────
      - run: npm run build
        env:
          PUBLIC_SANITY_PROJECT_ID: ry5ky7kc
          PUBLIC_SANITY_DATASET: production
          PUBLIC_CONTACT_WORKER_URL: ${{ secrets.PUBLIC_CONTACT_WORKER_URL }}

      - name: Upload to Hostiq via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /public_html/
          dangerous-clean-slate: false

      # ── Build for GitHub Pages (base "/dantist") ─────────────────
      - run: npx astro build --base /dantist --outdir dist-gh
        env:
          PUBLIC_SANITY_PROJECT_ID: ry5ky7kc
          PUBLIC_SANITY_DATASET: production
          PUBLIC_CONTACT_WORKER_URL: ${{ secrets.PUBLIC_CONTACT_WORKER_URL }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist-gh

  deploy-pages:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
